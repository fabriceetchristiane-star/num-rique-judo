<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ensemble des Techniques — JAK Lambersart</title>
  <link rel="stylesheet" href="styles/style.css">
  <script src="auth.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    header { background: linear-gradient(135deg, #1a1a2e, #2c3e50); color: white; padding: 1.5rem; text-align: center; }
    header h1 { margin: 0; font-size: 1.4rem; }
    header p { margin: 0.3rem 0 0; font-size: 0.85rem; opacity: 0.85; }
    .onglets { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.8rem; justify-content: center; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
    .onglet { padding: 0.45rem 0.9rem; border-radius: 20px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: bold; transition: all 0.2s; background: #eee; color: #333; }
    .onglet.active { color: white; background: #2c3e50; }
    .section { display: none; padding: 1rem; max-width: 900px; margin: 0 auto; }
    .section.active { display: block; }
    .famille-titre { font-size: 1.05rem; font-weight: bold; color: white; padding: 0.7rem 1rem; border-radius: 8px; margin-bottom: 0.8rem; text-align: center; }
    .grade-badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; margin-left: 0.5rem; font-weight: bold; vertical-align: middle; }
    .tech-card { background: white; border-radius: 10px; padding: 0.9rem; margin-bottom: 0.6rem; box-shadow: 0 2px 5px rgba(0,0,0,0.07); display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .tech-nom { font-weight: bold; font-size: 0.95rem; color: #2c3e50; }
    .btn-video { background: #e74c3c; color: white; border: none; padding: 0.45rem 0.85rem; border-radius: 20px; font-size: 0.78rem; font-weight: bold; text-decoration: none; white-space: nowrap; }
    .btn-video:hover { background: #c0392b; }
    footer { text-align: center; padding: 1.5rem; color: #888; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
<header>
  <h1>Ensemble des Techniques</h1>
  <p>Toutes les techniques par famille — du Blanc au Marron</p>
</header>

<div class="onglets">
  <button class="onglet active" onclick="afficher('ashi',this)">🦵 Ashi-Waza</button>
  <button class="onglet" onclick="afficher('koshi',this)">🌀 Koshi-Waza</button>
  <button class="onglet" onclick="afficher('te',this)">✋ Te-Waza</button>
  <button class="onglet" onclick="afficher('sutemi',this)">🤸 Sutemi-Waza</button>
  <button class="onglet" onclick="afficher('osae',this)">🔒 Osaekomi-Waza</button>
  <button class="onglet" onclick="afficher('shime',this)">🫁 Shime-Waza</button>
  <button class="onglet" onclick="afficher('kansetsu',this)">💪 Kansetsu-Waza</button>
</div>

<div id="sec-ashi" class="section active"></div>
<div id="sec-koshi" class="section"></div>
<div id="sec-te" class="section"></div>
<div id="sec-sutemi" class="section"></div>
<div id="sec-osae" class="section"></div>
<div id="sec-shime" class="section"></div>
<div id="sec-kansetsu" class="section"></div>

<nav style="text-align:center; margin-top:30px; padding:1rem;">
  <a class="lien-bleu" href="index.html">Retour a l'accueil</a>
</nav>
<footer><p>Dojo Numerique — Club Judo Lambersart JAK</p></footer>

<script>
// Couleurs par grade
const COULEURS = {
  'blanche-jaune': { bg:'#f0e68c', color:'#333', label:'Blanc/Jaune' },
  'jaune-orange':  { bg:'#ffa500', color:'white', label:'Jaune/Orange' },
  'orange-verte':  { bg:'#2e8b57', color:'white', label:'Orange/Verte' },
  'verte-bleue':   { bg:'#1a5276', color:'white', label:'Verte/Bleue' },
  'bleue-marron':  { bg:'#5d4037', color:'white', label:'Bleue/Marron' },
  'marron-noir':   { bg:'#1a1a1a', color:'white', label:'Marron/Noir' }
};

// Familles de techniques
const FAMILLES = {
  'ashi':     { label:'ASHI-WAZA — Techniques de pied et jambe', couleur:'#1a5276', mots:['ashi','gari','barai','guruma','harai','sasae','okuri'] },
  'koshi':    { label:'KOSHI-WAZA — Techniques de hanche', couleur:'#7d1f68', mots:['goshi','koshi','mata','nage kubi','ushiro goshi','sode'] },
  'te':       { label:'TE-WAZA — Techniques de main et bras', couleur:'#1a6e3a', mots:['seoi','otoshi','guruma kata','taoshi','uki otoshi','kuchiki','kibisu','makikomi','seoi otoshi','te guruma'] },
  'sutemi':   { label:'SUTEMI-WAZA — Techniques de sacrifice', couleur:'#7d5a00', mots:['gaeshi','tomoe','tani','ura nage','yoko guruma','yoko tomoe'] },
  'osae':     { label:'OSAEKOMI-WAZA — Immobilisations', couleur:'#5d4037', mots:['gatame','kesa','shiho'] },
  'shime':    { label:'SHIME-WAZA — Etranglements', couleur:'#c0392b', mots:['jime'] },
  'kansetsu': { label:'KANSETSU-WAZA — Cles de bras', couleur:'#2c3e50', mots:['hishigi','garami'] }
};

function afficher(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.onglet').forEach(o => o.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  btn.classList.add('active');
}

function appartientFamille(tech, famille) {
  const cat = (tech.categorie || '').toLowerCase();
  if (famille === 'ashi')     return cat.includes('ashi');
  if (famille === 'koshi')    return cat.includes('koshi');
  if (famille === 'te')       return cat.includes('te-waza');
  if (famille === 'sutemi')   return cat.includes('sutemi');
  if (famille === 'osae')     return cat.includes('ne-waza') || cat.includes('katame') || cat.includes('osae');
  if (famille === 'shime')    return cat.includes('shime');
  if (famille === 'kansetsu') return cat.includes('kansetsu');
  return false;
}

function construire(data) {
  Object.keys(FAMILLES).forEach(famId => {
    const fam = FAMILLES[famId];
    const div = document.getElementById('sec-' + famId);
    let html = '<div class="famille-titre" style="background:' + fam.couleur + '">' + fam.label + '</div>';
    let count = 0;

    Object.keys(COULEURS).forEach(gradeId => {
      const grade = COULEURS[gradeId];
      const videos = (data[gradeId] && data[gradeId].videos) ? data[gradeId].videos : [];

      videos.forEach(v => {
        if (appartientFamille(v, famId)) {
          html += '<div class="tech-card"><div>';
          html += '<div class="tech-nom">' + v.titre;
          html += '<span class="grade-badge" style="background:' + grade.bg + ';color:' + grade.color + '">' + grade.label + '</span>';
          html += '</div></div>';
          if (v.url) html += '<a class="btn-video" href="' + v.url + '" target="_blank">Video</a>';
          html += '</div>';
          count++;
        }
      });
    });

    if (count === 0) html += '<p style="text-align:center;color:#888;padding:1rem;">Aucune technique trouvee</p>';
    div.innerHTML = html;
  });
}

fetch('contenus-grades.json')
  .then(r => r.json())
  .then(data => construire(data))
  .catch(err => console.error('Erreur:', err));
</script>
</body>
</html>
